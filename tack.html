<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta name="robots" content="noindex, nofollow">
    
    <title>Tack för din bokning | mkFix</title>
    <link rel="stylesheet" href="global.css">
    <style>
        .thanks-container {
            height: 80vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }
        .check-icon {
            font-size: 4rem;
            color: var(--success);
            margin-bottom: 1.5rem;
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <nav>
                <a href="/" class="logo">mkFix</a>
            </nav>
        </div>
    </header>

    <main class="thanks-container">
        <div class="check-icon">✓</div>
        <h1>Tack för din förfrågan!</h1>
        <p>Jag har tagit emot ditt meddelande och återkommer till dig så snart jag kan (oftast inom 24 timmar).</p>
        <br>
        <a href="/" class="submit-btn" style="text-decoration: none;">TILLBAKA TILL STARTSIDAN</a>
    </main>

    <footer>
        <p>&copy; 2026 mkFix Sverige.</p>
    </footer>
</body>
</html>
